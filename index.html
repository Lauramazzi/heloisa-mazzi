<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0d">
<meta name="description" content="Gestão financeira da barbearia Heloísa Mazzi">
<title>Heloísa Mazzi</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="loading-logo"><i class="ti ti-scissors"></i></div>
    <div class="loading-text">Heloísa Mazzi</div>
    <div class="loading-sub">carregando...</div>
  </div>

  <!-- APP PRINCIPAL (oculto até carregar) -->
  <div id="main" style="display:none">
    <div class="app-wrap">

      <!-- HEADER -->
      <div class="app-header">
        <div class="brand">
          <div class="brand-av"><i class="ti ti-scissors"></i></div>
          <div>
            <div class="brand-name">Heloísa Mazzi</div>
            <div class="brand-sub">Gestão financeira</div>
          </div>
        </div>
        <span class="mes-tag" id="mes-tag">jul/2026</span>
      </div>

      <!-- SEÇÕES -->
      <div id="sec-painel"  class="sec active"></div>
      <div id="sec-junho"   class="sec"></div>
      <div id="sec-alertas" class="sec"></div>
      <div id="sec-reserva" class="sec"></div>
      <div id="sec-metas"   class="sec"></div>
      <div id="sec-bebidas" class="sec"></div>

      <!-- NAV -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="painel"  onclick="switchTab('painel',this)"><i class="ti ti-home"></i><span>Painel</span></button>
        <button class="nav-item"        data-tab="junho"   onclick="switchTab('junho',this)"><i class="ti ti-plus"></i><span>Saídas</span></button>
        <button class="nav-item"        data-tab="alertas" onclick="switchTab('alertas',this)"><i class="ti ti-bell"></i><span>Alertas</span></button>
        <button class="nav-item"        data-tab="reserva" onclick="switchTab('reserva',this)"><i class="ti ti-piggy-bank"></i><span>Reserva</span></button>
        <button class="nav-item"        data-tab="metas"   onclick="switchTab('metas',this)"><i class="ti ti-target"></i><span>Metas</span></button>
        <button class="nav-item"        data-tab="bebidas" onclick="switchTab('bebidas',this)"><i class="ti ti-beer"></i><span>Bebidas</span></button>
      </nav>

    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ======================================================
       MODAL: NOVA SAÍDA
  ====================================================== -->
  <div class="modal-overlay" id="modal-lanc" onclick="closeIfBg(event,'modal-lanc')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Nova saída</div>
        <button class="modal-close" onclick="closeModal('modal-lanc')"><i class="ti ti-x"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">O que foi pago?</label>
        <input class="form-input" type="text" id="l-desc" placeholder="Ex: Marketing, produtos...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input class="form-input" type="number" id="l-val" step="0.01" inputmode="decimal" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input class="form-input" type="date" id="l-data">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <div class="cat-grid" id="cat-grid-lanc"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Pagamento</label>
        <div class="toggle-row">
          <button class="toggle-btn pag-btn active" onclick="selPag('Pix',this)">Pix</button>
          <button class="toggle-btn pag-btn" onclick="selPag('Dinheiro',this)">Dinheiro</button>
          <button class="toggle-btn pag-btn" onclick="selPag('Cartão',this)">Cartão</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Obs. (opcional)</label>
        <input class="form-input" type="text" id="l-obs" placeholder="Fornecedor, nota...">
      </div>
      <button class="btn-primary" onclick="salvarLanc()"><i class="ti ti-check"></i> Registrar saída</button>
    </div>
  </div>

  <!-- ======================================================
       MODAL: FECHAR MÊS
  ====================================================== -->
  <div class="modal-overlay" id="modal-fechamento" onclick="closeIfBg(event,'modal-fechamento')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Fechar mês</div>
        <button class="modal-close" onclick="closeModal('modal-fechamento')"><i class="ti ti-x"></i></button>
      </div>
      <div class="fechamento-mes-badge">
        <i class="ti ti-calendar-check" style="color:var(--gold);font-size:20px"></i>
        <span id="f-mes-label" style="font-size:16px;font-weight:600;color:var(--gold)">—</span>
      </div>
      <input type="hidden" id="f-mes">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Faturamento bruto (R$)</label>
          <input class="form-input" type="number" id="f-fat" step="0.01" inputmode="decimal" placeholder="0,00" oninput="calcTicketPreview()">
        </div>
        <div class="form-group">
          <label class="form-label">Total de atendimentos</label>
          <input class="form-input" type="number" id="f-atend" inputmode="numeric" placeholder="0" oninput="calcTicketPreview()">
        </div>
      </div>
      <div class="ticket-preview">
        <span style="font-size:12px;color:var(--text2)">Ticket médio calculado:</span>
        <span id="f-ticket-preview" style="font-size:18px;font-weight:600;color:var(--green);font-family:var(--mono)">—</span>
      </div>
      <button class="btn-primary" onclick="salvarFechamento()"><i class="ti ti-calendar-check"></i> Fechar e salvar</button>
    </div>
  </div>

  <!-- ======================================================
       MODAL: NOVO/EDITAR VENCIMENTO
  ====================================================== -->
  <div class="modal-overlay" id="modal-vencimento" onclick="closeIfBg(event,'modal-vencimento')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="v-titulo">Novo vencimento</div>
        <button class="modal-close" onclick="closeModal('modal-vencimento')"><i class="ti ti-x"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Nome do vencimento</label>
        <input class="form-input" type="text" id="v-nome" placeholder="Ex: App Barber, Aluguel...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input class="form-input" type="number" id="v-valor" step="0.01" inputmode="decimal" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Dia do mês</label>
          <input class="form-input" type="number" id="v-dia" min="1" max="31" inputmode="numeric" placeholder="1–31">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <input class="form-input" type="text" id="v-tipo" placeholder="Ex: Fixo, Parcela 2/12...">
      </div>
      <div class="form-group">
        <label class="form-label">Avisar quantos dias antes</label>
        <div class="toggle-row">
          <button class="toggle-btn aviso-btn active" data-aviso="1" onclick="selAviso(1,this)">1 dia</button>
          <button class="toggle-btn aviso-btn" data-aviso="3" onclick="selAviso(3,this)">3 dias</button>
          <button class="toggle-btn aviso-btn" data-aviso="7" onclick="selAviso(7,this)">7 dias</button>
        </div>
        <input type="hidden" id="v-aviso" value="3">
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="v-encerra" style="width:18px;height:18px;accent-color:var(--gold)">
        <label for="v-encerra" class="form-label" style="margin:0">Este é o último mês desta conta</label>
      </div>
      <button class="btn-primary" onclick="salvarVencimento()"><i class="ti ti-check"></i> Salvar vencimento</button>
    </div>
  </div>

  <!-- ======================================================
       MODAL: DEPÓSITO
  ====================================================== -->
  <div class="modal-overlay" id="modal-dep" onclick="closeIfBg(event,'modal-dep')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="dep-titulo">Registrar entrada</div>
        <button class="modal-close" onclick="closeModal('modal-dep')"><i class="ti ti-x"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de transação</label>
        <div class="toggle-row">
          <button class="toggle-btn dep-tipo-btn active" data-tipo="entrada" onclick="selDepTipo('entrada',this)">
            <i class="ti ti-arrow-down-circle" style="color:var(--green)"></i> Entrada
          </button>
          <button class="toggle-btn dep-tipo-btn" data-tipo="saida" onclick="selDepTipo('saida',this)">
            <i class="ti ti-arrow-up-circle" style="color:var(--red)"></i> Saída
          </button>
        </div>
        <input type="hidden" id="d-tipo" value="entrada">
      </div>
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" type="number" id="d-val" step="0.01" inputmode="decimal" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" type="date" id="d-data">
      </div>
      <div class="form-group">
        <label class="form-label">Observação (opcional)</label>
        <input class="form-input" type="text" id="d-obs" placeholder="Ex: guardado da semana, retirada para despesa...">
      </div>
      <button class="btn-primary" id="dep-btn-salvar" onclick="salvarDeposito()"><i class="ti ti-piggy-bank"></i> Confirmar entrada</button>
    </div>
  </div>

  <!-- ======================================================
       MODAL: BEBIDA
  ====================================================== -->
  <div class="modal-overlay" id="modal-bev" onclick="closeIfBg(event,'modal-bev')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Registrar compra de bebida</div>
        <button class="modal-close" onclick="closeModal('modal-bev')"><i class="ti ti-x"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Fornecedor</label>
        <input class="form-input" type="text" id="b-forn" placeholder="Ex: Helder">
      </div>
      <div class="form-group">
        <label class="form-label">Produto</label>
        <input class="form-input" type="text" id="b-prod" placeholder="Ex: Cerveja Heineken 250ml">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Quantidade</label>
          <input class="form-input" type="number" id="b-qtd" placeholder="0" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Valor total (R$)</label>
          <input class="form-input" type="number" id="b-val" step="0.01" placeholder="0,00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" type="date" id="b-data">
      </div>
      <button class="btn-primary" onclick="salvarBebida()"><i class="ti ti-check"></i> Registrar compra</button>
    </div>
  </div>

  <!-- ======================================================
       MODAL: EDITAR DEPÓSITO
  ====================================================== -->
  <div class="modal-overlay" id="modal-dep-edit" onclick="closeIfBg(event,'modal-dep-edit')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Editar transação</div>
        <button class="modal-close" onclick="closeModal('modal-dep-edit')"><i class="ti ti-x"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <div class="toggle-row">
          <button class="toggle-btn dep-edit-tipo-btn active" data-tipo="entrada" onclick="selDepEditTipo('entrada',this)">
            <i class="ti ti-arrow-down-circle" style="color:var(--green)"></i> Entrada
          </button>
          <button class="toggle-btn dep-edit-tipo-btn" data-tipo="saida" onclick="selDepEditTipo('saida',this)">
            <i class="ti ti-arrow-up-circle" style="color:var(--red)"></i> Saída
          </button>
        </div>
        <input type="hidden" id="de-tipo" value="entrada">
      </div>
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" type="number" id="de-val" step="0.01" inputmode="decimal" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" type="date" id="de-data">
      </div>
      <div class="form-group">
        <label class="form-label">Observação</label>
        <input class="form-input" type="text" id="de-obs" placeholder="Ex: guardado da semana">
      </div>
      <button class="btn-primary" onclick="salvarEdicaoDeposito()"><i class="ti ti-check"></i> Salvar alterações</button>
    </div>
  </div>

  <!-- ======================================================
       MODAL: NOVA / EDITAR META
  ====================================================== -->
  <div class="modal-overlay" id="modal-meta-item" onclick="closeIfBg(event,'modal-meta-item')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="mi-titulo">Nova meta</div>
        <button class="modal-close" onclick="closeModal('modal-meta-item')"><i class="ti ti-x"></i></button>
      </div>
      <div id="mi-real-info" style="font-size:11px;color:var(--gold);background:rgba(250,199,117,0.07);border:0.5px solid rgba(250,199,117,0.2);border-radius:8px;padding:8px 12px;margin-bottom:12px">Valor realizado calculado automaticamente do último fechamento.</div>
      <div class="form-group">
        <label class="form-label">Nome da meta</label>
        <input class="form-input" type="text" id="mi-label" placeholder="Ex: Faturamento mínimo">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor alvo</label>
          <input class="form-input" type="number" id="mi-target" step="0.01" inputmode="decimal" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Valor realizado</label>
          <input class="form-input" type="number" id="mi-real" step="0.01" inputmode="decimal" placeholder="Deixar vazio = auto">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de meta</label>
        <div class="toggle-row">
          <button class="toggle-btn tipo-btn active" data-tipo="min" onclick="selMetaTipo('min',this)">↑ Atingir mínimo</button>
          <button class="toggle-btn tipo-btn" data-tipo="max" onclick="selMetaTipo('max',this)">↓ Não ultrapassar</button>
        </div>
        <input type="hidden" id="mi-tipo" value="min">
      </div>
      <div class="form-group">
        <label class="form-label">Formato de exibição</label>
        <div class="toggle-row">
          <button class="toggle-btn fmt-btn active" data-fmt="brl" onclick="selMetaFmt('brl',this)">R$ Valor</button>
          <button class="toggle-btn fmt-btn" data-fmt="num" onclick="selMetaFmt('num',this)">123 Número</button>
          <button class="toggle-btn fmt-btn" data-fmt="pct" onclick="selMetaFmt('pct',this)">% Percent.</button>
        </div>
        <input type="hidden" id="mi-fmt" value="brl">
      </div>
      <button class="btn-primary" onclick="salvarMetaItem()"><i class="ti ti-check"></i> Salvar meta</button>
    </div>
  </div>

</div><!-- #app -->

  <!-- aviso buttons -->
  <script>
  function selAviso(v, btn) {
    document.getElementById('v-aviso').value = v;
    document.querySelectorAll('.aviso-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }
  </script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
